<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 40 40" width="64" height="64">
  <!-- Petals -->
  <g opacity="0.95">
    <ellipse cx="0" cy="-10" rx="4.2" ry="9.5" fill="#C91255" transform="rotate(0)"  />
    <ellipse cx="0" cy="-10" rx="4.2" ry="9.5" fill="#C91255" transform="rotate(72)" />
    <ellipse cx="0" cy="-10" rx="4.2" ry="9.5" fill="#C91255" transform="rotate(144)"/>
    <ellipse cx="0" cy="-10" rx="4.2" ry="9.5" fill="#C91255" transform="rotate(216)"/>
    <ellipse cx="0" cy="-10" rx="4.2" ry="9.5" fill="#C91255" transform="rotate(288)"/>
  </g>
  <!-- Petal highlights -->
  <g opacity="0.35">
    <ellipse cx="1" cy="-11" rx="1.8" ry="5.5" fill="#ffffff" transform="rotate(0)"  />
    <ellipse cx="1" cy="-11" rx="1.8" ry="5.5" fill="#ffffff" transform="rotate(72)" />
    <ellipse cx="1" cy="-11" rx="1.8" ry="5.5" fill="#ffffff" transform="rotate(144)"/>
    <ellipse cx="1" cy="-11" rx="1.8" ry="5.5" fill="#ffffff" transform="rotate(216)"/>
    <ellipse cx="1" cy="-11" rx="1.8" ry="5.5" fill="#ffffff" transform="rotate(288)"/>
  </g>
  <!-- Stamen -->
  <circle r="5" fill="#D9B820" />
  <circle r="3" fill="#f5d76e" />
  <!-- Stamen dots -->
  <circle cx="0"    cy="-2.2" r="0.7" fill="#C91255" opacity="0.8"/>
  <circle cx="2.1"  cy="1.1"  r="0.7" fill="#C91255" opacity="0.8"/>
  <circle cx="-2.1" cy="1.1"  r="0.7" fill="#C91255" opacity="0.8"/>
</svg>
